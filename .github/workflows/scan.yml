name: Update Signal Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas numpy ccxt requests
      - name: Run scanner
        run: python unified_dashboard.py
      - name: Commit and push dashboard.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          git diff --staged --quiet || git commit -m "Auto-update dashboard $(date -u)"
          git push
